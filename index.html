<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Laksmi 🎂</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(120deg,#ff9a9e,#fad0c4);
overflow:hidden;
color:white;
}

/* typing title */

#title{
font-size:60px;
margin-top:80px;
letter-spacing:2px;
}

/* fade-in photo */

.photo{
width:320px;
height:240px;
margin:auto;
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
opacity:0;
animation:fadePhoto 3s forwards;
animation-delay:2s;
}

.photo img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes fadePhoto{
to{opacity:1;}
}

p{
font-size:24px;
}

#countdown{
font-size:32px;
margin:20px;
}

/* balloons */

.balloon{
width:60px;
height:80px;
border-radius:50%;
position:absolute;
bottom:-120px;
animation:float 10s linear infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-1200px);}
}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
animation:fall 5s linear infinite;
}

@keyframes fall{
from{transform:translateY(-100px) rotate(0deg);}
to{transform:translateY(1000px) rotate(360deg);}
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:#ff4b5c;
cursor:pointer;
}

</style>

</head>

<body>

<h1 id="title"></h1>

<p>Wishing you a beautiful and joyful year ahead.</p>
<p>— From Jnanesh ❤️</p>

<div id="countdown"></div>

<div class="photo">
<img src="photo.jpg">
</div>

<br>

<button onclick="startConfetti()">Open Your Surprise 🎁</button>

<audio autoplay loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

/* typing effect */

var text = "🎉 Happy Birthday Laksmi 🎉";
var i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("title").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter,80);
}
}

typeWriter();


/* countdown */

var birthday = new Date("March 13, 2026 00:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();
var distance = birthday - now;

var days = Math.floor(distance/(1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));
var seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
"Countdown: "+days+"d "+hours+"h "+minutes+"m "+seconds+"s";

},1000);


/* balloons */

function balloon(){

var b=document.createElement("div");
b.className="balloon";

var colors=["red","blue","yellow","green","purple","orange"];

b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.left=Math.random()*100+"%";
b.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(b);

setTimeout(()=>{b.remove()},10000);

}

setInterval(balloon,500);


/* confetti */

function startConfetti(){

for(var i=0;i<80;i++){

var c=document.createElement("div");
c.className="confetti";

var colors=["red","blue","yellow","green","purple"];

c.style.background=colors[Math.floor(Math.random()*colors.length)];
c.style.left=Math.random()*100+"%";
c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>{c.remove()},5000);

}

}

</script>

</body>
</html>
